name: Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      run_seed:
        description: 'Run seed.sql after schema?'
        required: false
        default: false
        type: boolean
      migration_type:
        description: 'Which migration to run'
        required: true
        default: 'expenses-fix'
        type: choice
        options:
          - expenses-fix
          - add-expenses
          - schema

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    name: Run Schema Migration
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migration
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_PORT: '1433'
          SQL_ENCRYPT: 'true'
          SQL_TRUST_CERT: 'false'
        run: |
          case "${{ github.event.inputs.migration_type }}" in
            expenses-fix) npm run db:migrate:expenses-fix ;;
            add-expenses) npm run db:migrate:add-expenses ;;
            schema) npm run db:migrate ;;
          esac

      - name: Run seed data
        if: ${{ github.event.inputs.run_seed == 'true' }}
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_PORT: '1433'
          SQL_ENCRYPT: 'true'
          SQL_TRUST_CERT: 'false'
        run: npm run db:seed
