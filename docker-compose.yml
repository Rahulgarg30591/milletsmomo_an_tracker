services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:1.0.7
    container_name: millets-momo-sql
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "MomoDev2024!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "MomoDev2024!" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s